<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crab-Crab Care v3.1 | 비전 AI & 실시간 지능</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="med-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="empathy-title">🦀 할아버지, 소중한 건강을 챙길 시간이에요!</h2>
            <p id="med-message" class="med-text">지금 약을 드시면 제가 더 든든할 것 같아요.</p>
            <div class="pill-icon">💊</div>
            <button id="pill-confirm-btn" class="pill-btn">약을 잘 챙겨 먹었어요</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>🦀 Crab-Crab Care <span class="version-tag">v3.1</span></h1>
            <div class="header-right">
                <div id="vision-status" class="status-vision">🔒 프라이버시 보호 중</div>
                <div id="status-indicator" class="status-normal">상태: 정상</div>
            </div>
        </header>

        <main>
            <section class="dashboard">
                <!-- v3.1: Safety Vision Camera Section -->
                <div class="card vision-card">
                    <h3>세이프티 비전 (카메라 보호)</h3>
                    <div class="video-container">
                        <video id="webcam" autoplay playsinline muted></video>
                        <canvas id="vision-overlay"></canvas>
                        <div id="vision-label" class="vision-label">분석 대기 중...</div>
                    </div>
                    <button id="camera-btn" class="camera-btn">지킴이 카메라 켜기</button>
                </div>

                <div class="card health">
                    <h3>오늘의 건강 현황</h3>
                    <div class="stats">
                        <div class="stat"><span class="label">심박수:</span> <span id="heart-rate">--</span> bpm</div>
                        <div class="stat"><span class="label">걸음수:</span> <span id="steps">--</span> 보</div>
                        <div id="gait-alert-box" class="gait-alert hidden">⚠️ 보행 이상 감지됨</div>
                    </div>
                </div>
            </section>

            <section class="chat-section">
                <h3>AI 말벗 (Crab-Care)</h3>
                <div id="chat-window" class="chat-window">
                    <div class="message system">안녕하세요! 할아버지의 든든한 조력자 Crab-Care입니다. 무엇이든 말씀해 주세요.</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="user-input" placeholder="하고 싶은 말을 입력하세요...">
                    <button id="send-btn">말하기</button>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
