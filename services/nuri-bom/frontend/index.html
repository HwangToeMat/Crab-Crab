<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>누리봄 (Nuri-Bom)</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        .spring-green { background-color: #4ADE80; }
        .sunny-yellow { background-color: #FACC15; }
        .warm-orange { background-color: #FB923C; }
        .nuri-bubble {
            background: white;
            border-radius: 20px 20px 20px 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #E2E8F0;
        }
        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('home'); // home, post, chat
            const [missions, setMissions] = useState([]);
            const [user, setUser] = useState(null);
            const [content, setContent] = useState('');
            const [type, setType] = useState('food');
            const [chatRoom, setChatRoom] = useState(null);
            const [messages, setMessages] = useState([]);
            const [msgInput, setMsgInput] = useState('');
            const [socket, setSocket] = useState(null);

            useEffect(() => {
                const savedUser = localStorage.getItem('nuribom_user');
                if (savedUser) {
                    setUser(JSON.parse(savedUser));
                } else {
                    initUser();
                }

                fetchMissions();
                const newSocket = io('http://localhost:4050');
                setSocket(newSocket);
                
                newSocket.on('receive_message', (data) => {
                    setMessages(prev => [...prev, data]);
                });

                return () => newSocket.close();
            }, []);

            const initUser = async () => {
                const nicknames = ['푸른새싹', '따스한햇살', '봄바람친구', '초록숲', '노랑나비'];
                const nickname = nicknames[Math.floor(Math.random() * nicknames.length)];
                try {
                    const res = await fetch('http://localhost:4050/api/users/init', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nickname, location: '강남구 역삼동' })
                    });
                    const data = await res.json();
                    setUser(data);
                    localStorage.setItem('nuribom_user', JSON.stringify(data));
                } catch (e) { console.error(e); }
            };

            const fetchMissions = async () => {
                try {
                    const res = await fetch('http://localhost:4050/api/missions');
                    const data = await res.json();
                    setMissions(data);
                } catch (e) { console.error(e); }
            };

            const createMission = async () => {
                if (!content) return;
                try {
                    await fetch('http://localhost:4050/api/missions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            authorId: user.id, 
                            nickname: user.nickname, 
                            type, 
                            content 
                        })
                    });
                    setContent('');
                    setView('home');
                    fetchMissions();
                } catch (e) { console.error(e); }
            };

            const joinMission = async (missionId) => {
                try {
                    const res = await fetch(`http://localhost:4050/api/missions/${missionId}/join`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: user.id })
                    });
                    const data = await res.json();
                    if (data.matched) {
                        setChatRoom(data.roomId);
                        setView('chat');
                        socket.emit('join_room', data.roomId);
                    }
                } catch (e) { console.error(e); }
            };

            const sendMessage = () => {
                if (!msgInput) return;
                socket.emit('send_message', { roomId: chatRoom, senderId: user.id, text: msgInput });
                setMsgInput('');
            };

            const [isMatching, setIsMatching] = useState(false);

            const MissionCard = ({ mission }) => {
                const icons = { food: '🍕', activity: '🏃', borrow: '🔨' };
                const colors = { food: 'border-green-200 bg-green-50', activity: 'border-yellow-200 bg-yellow-50', borrow: 'border-orange-200 bg-orange-50' };
                
                return (
                    <div className={`p-6 rounded-3xl border-2 mb-4 shadow-sm transition hover:shadow-md cursor-pointer ${colors[mission.type]}`} onClick={() => joinMission(mission.id)}>
                        <div className="flex justify-between items-start mb-3">
                            <div className="flex items-center space-x-2">
                                <span className="text-4xl">{icons[mission.type]}</span>
                                <span className="bg-white/90 px-3 py-1 rounded-full text-[11px] font-black text-green-600 border border-green-100">{mission.distance}km 근처</span>
                            </div>
                            <span className="bg-white/80 px-3 py-1 rounded-full text-xs font-bold text-slate-500">방금 전</span>
                        </div>
                        <p className="text-xl font-bold text-slate-800 mb-4 leading-tight">{mission.content}</p>
                        <div className="flex justify-between items-center">
                            <div className="flex items-center space-x-2">
                                <span className="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-xs">👤</span>
                                <div className="flex flex-col">
                                    <span className="text-sm font-black text-slate-700 flex items-center">
                                        {mission.author_nickname}
                                        <span className="ml-1 text-[10px] bg-blue-500 text-white px-1 rounded">인증</span>
                                    </span>
                                </div>
                            </div>
                            <span className="text-md font-black text-spring-green">함께하기 ></span>
                        </div>
                    </div>
                );
            };

            if (view === 'chat') {
                return (
                    <div className="max-w-md mx-auto h-screen flex flex-col bg-white">
                        <header className="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                            <button onClick={() => setView('home')} className="text-slate-400">← 뒤로</button>
                            <h2 className="font-bold text-slate-800">이웃과 조율 중</h2>
                            <div className="w-8"></div>
                        </header>
                        <div className="flex-grow overflow-y-auto p-4 space-y-4">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.senderId === user.id ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[80%] p-4 rounded-2xl ${m.senderId === user.id ? 'spring-green text-white rounded-tr-none' : 'bg-slate-100 text-slate-800 rounded-tl-none'}`}>
                                        {m.text}
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-4 border-t flex space-x-2">
                            <input 
                                value={msgInput} 
                                onChange={(e) => setMsgInput(e.target.value)} 
                                onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                                placeholder="메시지를 입력하세요" 
                                className="flex-grow p-3 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-green-300"
                            />
                            <button onClick={sendMessage} className="spring-green text-white px-6 py-2 rounded-xl font-bold">전송</button>
                        </div>
                    </div>
                );
            }

            if (view === 'post') {
                return (
                    <div className="max-w-md mx-auto p-6 bg-white h-screen">
                        <header className="flex justify-between items-center mb-10">
                            <button onClick={() => setView('home')} className="text-2xl">✕</button>
                            <h2 className="text-xl font-bold">미션 등록하기</h2>
                            <div className="w-6"></div>
                        </header>
                        <div className="space-y-6">
                            <div>
                                <p className="text-sm font-bold text-slate-500 mb-3">미션 유형</p>
                                <div className="flex space-x-2">
                                    {[ ['food', '🍕 나눠먹기'], ['activity', '🏃 함께하기'], ['borrow', '🔨 빌려주기'] ].map(([v, l]) => (
                                        <button 
                                            key={v}
                                            onClick={() => setType(v)}
                                            className={`flex-grow py-3 rounded-2xl text-sm font-bold border-2 transition ${type === v ? 'spring-green border-green-400 text-white' : 'bg-slate-50 border-slate-100 text-slate-400'}`}
                                        >
                                            {l}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <p className="text-sm font-bold text-slate-500 mb-3">내용</p>
                                <textarea 
                                    value={content}
                                    onChange={(e) => setContent(e.target.value)}
                                    placeholder="어떤 미션을 함께하고 싶나요?"
                                    className="w-full p-4 bg-slate-50 rounded-2xl border-none h-40 outline-none focus:ring-2 focus:ring-green-300 text-lg"
                                ></textarea>
                            </div>
                            <button onClick={createMission} className="w-full py-5 spring-green text-white rounded-3xl font-black text-xl shadow-lg shadow-green-100">미션 올리기</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto pb-24">
                    <header className="p-6 bg-white flex justify-between items-end mb-6">
                        <div>
                            <h1 className="text-3xl font-black text-green-500 tracking-tight">누리봄</h1>
                            <p className="text-slate-400 font-bold flex items-center">
                                <span className="mr-1">📍</span> 역삼동 하이퍼로컬
                            </p>
                        </div>
                        <div className="w-12 h-12 rounded-full sunny-yellow flex items-center justify-center text-2xl shadow-inner shadow-yellow-200">
                            🌞
                        </div>
                    </header>

                    <div className="px-6 mb-10">
                        <div className="nuri-bubble p-5 relative">
                            <div className="flex items-center space-x-3 mb-2">
                                <span className="text-2xl animate-bounce-slow">🌱</span>
                                <span className="font-bold text-green-600">AI 누리</span>
                            </div>
                            <p className="text-slate-700 font-medium leading-relaxed">
                                안녕하세요, {user?.nickname}님! <br/>
                                오늘은 날씨가 참 좋아요. <br/>
                                <span className="text-green-500 font-black">나눠먹기 미션</span>이 새로 올라왔어요!
                            </p>
                            <div className="absolute -bottom-2 left-6 w-4 h-4 bg-white border-r border-b border-slate-200 transform rotate-45"></div>
                        </div>
                    </div>

                    <div className="px-6 space-y-2 mb-6">
                        <h3 className="text-xl font-black text-slate-800">지금 우리 동네는</h3>
                        <div className="flex space-x-2 overflow-x-auto pb-2 scrollbar-hide">
                            {['전체', '나눠먹기', '함께하기', '빌려주기'].map(t => (
                                <button key={t} className="whitespace-nowrap px-4 py-2 rounded-full bg-white border border-slate-200 text-sm font-bold text-slate-500 hover:border-green-300 hover:text-green-500">
                                    {t}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="px-6">
                        {missions.length > 0 ? (
                            missions.map(m => <MissionCard key={m.id} mission={m} />)
                        ) : (
                            <div className="py-20 text-center text-slate-300 font-bold">
                                아직 동네 미션이 없어요. <br/> 첫 미션을 올려보세요!
                            </div>
                        )}
                    </div>

                    <button 
                        onClick={() => setView('post')}
                        className="fixed bottom-8 right-8 w-16 h-16 spring-green text-white rounded-full flex items-center justify-center text-3xl shadow-xl shadow-green-200 border-4 border-white active:scale-95 transition"
                    >
                        +
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
