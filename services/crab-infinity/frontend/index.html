<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crab-Infinity Nexus Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🦀 Crab-Infinity <span class="badge">v2.0 EVO</span></h1>
            <p>Integrated AI Command Center for CrabTeam Ecosystem</p>
        </header>

        <section id="system-status">
            <h2>Current State</h2>
            <div id="state-card" class="card">
                <p>Loading project state...</p>
            </div>
        </section>

        <section id="evolution-action" class="card">
            <h2>Manual Evolution</h2>
            <div class="input-group">
                <input type="text" id="achievement-input" placeholder="What did you evolve today?">
                <button id="evolve-btn">EVOLVE</button>
            </div>
            <p id="ai-msg" style="margin-top: 10px; font-style: italic; color: var(--secondary);">Waiting for input...</p>
        </section>

        <section id="services-grid">
            <h2>Active Services</h2>
            <div id="services-list" class="grid">
                <!-- 서비스 목록이 여기에 렌더링됩니다 -->
            </div>
        </section>

        <section id="ai-insight">
            <h2>Infinity Brain Insight</h2>
            <div id="analysis-content" class="card">
                <p>Gathering ecosystem intelligence...</p>
            </div>
            <div id="metrics-container" class="metrics-grid">
                <!-- 메트릭 카드가 여기에 렌더링됩니다 -->
            </div>
        </section>

        <footer>
            <p>&copy; 2026 CrabTeam - Infinite Evolution Mode Active</p>
        </footer>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
