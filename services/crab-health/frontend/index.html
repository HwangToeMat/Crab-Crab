<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Crab-Health: 꽃게헬스</title>
    <style>
        :root {
            --bg: #eff6ff;
            --primary: #2563eb;
            --accent: #f97316;
            --card: #ffffff;
            --text: #1e293b;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; margin: 0; padding: 2rem; }
        .dashboard { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }
        .card { background: var(--card); padding: 2rem; border-radius: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 2px solid #dbeafe; }
        .evo-badge { background: linear-gradient(90deg, #2563eb, #6366f1); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; display: inline-block; margin-bottom: 1rem; }
        h1 { color: var(--primary); margin: 0; font-size: 2rem; }
        .coach-box { background: #fff7ed; border-left: 5px solid var(--accent); padding: 1.5rem; border-radius: 10px; margin-top: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
        input, select { padding: 0.8rem; border-radius: 10px; border: 1px solid #cbd5e1; }
        button { background: var(--primary); color: white; border: none; padding: 1rem; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .routine-list { list-style: none; padding: 0; }
        .routine-list li { padding: 0.8rem; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; }
        .routine-list li::before { content: "🦀"; margin-right: 0.5rem; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="card">
            <div class="evo-badge">v2.0 EVOLUTION</div>
            <h1>🥗 Crab-Health</h1>
            <p>AI가 제안하는 당신만을 위한 헬스 케어</p>
            
            <div class="form-group">
                <label>오늘의 운동 목표</label>
                <select id="goalSelect">
                    <option value="체중 감량">체중 감량</option>
                    <option value="근력 향상">근력 향상</option>
                    <option value="체력 증진">체력 증진</option>
                </select>
                <button onclick="getRoutine()">루틴 추천받기</button>
            </div>
            
            <div id="routineResult" style="display:none; margin-top: 2rem;">
                <h3>🏃 오늘의 추천 루틴</h3>
                <ul id="routineList" class="routine-list"></ul>
                <div id="coachMessage" class="coach-box"></div>
            </div>
        </div>

        <div class="card">
            <h3>🍽️ AI 식단 분석기</h3>
            <div class="form-group">
                <input type="text" id="mealText" placeholder="오늘 드신 음식을 입력하세요 (예: 삼겹살, 비빔밥)">
                <button onclick="analyzeMeal()" style="background:var(--accent)">영양 분석 시작</button>
            </div>
            <div id="mealResult" style="display:none; margin-top: 1.5rem; padding: 1rem; background: #f0fdf4; border-radius: 10px;">
                <b id="healthScore">분석 점수: 95점</b><br>
                <span id="mealFeedback">훌륭한 단백질 섭취입니다!</span>
            </div>
        </div>
    </div>

    <script>
        function getRoutine() {
            const goal = document.getElementById('goalSelect').value;
            const res = document.getElementById('routineResult');
            const list = document.getElementById('routineList');
            const msg = document.getElementById('coachMessage');
            
            // 시뮬레이션
            const routines = {
                "체중 감량": ["런닝머신 30분", "버피 테스트 15회 x 3세트", "플랭크 1분"],
                "근력 향상": ["데드리프트 10회 x 3세트", "벤치 프레스 12회 x 3세트", "스쿼트 20회 x 4세트"],
                "체력 증진": ["등산 1시간", "수영 40분", "스트레칭 15분"]
            };
            
            list.innerHTML = "";
            routines[goal].forEach(r => {
                const li = document.createElement('li');
                li.innerText = r;
                list.appendChild(li);
            });
            
            msg.innerHTML = `<b>🦀 꽃게 코치의 한마디:</b><br>딱딱한 껍질 안의 강력한 에너지를 믿으세요! ${goal} 목표를 향해 전진!`;
            res.style.display = 'block';
        }

        function analyzeMeal() {
            const meal = document.getElementById('mealText').value;
            if(!meal) return;
            
            const res = document.getElementById('mealResult');
            const score = document.getElementById('healthScore');
            const feedback = document.getElementById('mealFeedback');
            
            res.style.display = 'block';
            const randomScore = Math.floor(Math.random() * 30) + 70;
            score.innerText = `분석 점수: ${randomScore}점`;
            feedback.innerText = randomScore > 85 ? "영양 균형이 아주 좋습니다!" : "탄수화물을 조금만 줄여볼까요?";
        }
    </script>
</body>
</html>
