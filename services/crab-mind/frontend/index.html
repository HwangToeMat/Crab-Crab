<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꽃게마인드 (Crab-Mind)</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🦀 꽃게마인드</h1>
            <p>당신의 마음에 귀 기울이는 작은 위로</p>
        </header>
        
        <main>
            <section class="journal-input">
                <h2>오늘의 기분은 어떤가요?</h2>
                <div class="mood-selector">
                    <button class="mood-btn" data-mood="기쁨">😆 기쁨</button>
                    <button class="mood-btn" data-mood="슬픔">😢 슬픔</button>
                    <button class="mood-btn" data-mood="화남">😡 화남</button>
                    <button class="mood-btn" data-mood="지침">🫠 지침</button>
                    <button class="mood-btn" data-mood="평온">😌 평온</button>
                </div>
                
                <textarea id="journal-text" placeholder="오늘 어떤 일이 있었는지 꽃게에게 편하게 털어놓아 보세요..."></textarea>
                <button id="submit-btn" class="btn-primary">마음 전송하기</button>
            </section>
            
            <section id="ai-response" class="hidden">
                <div class="crab-avatar">🦀</div>
                <div class="speech-bubble">
                    <p id="ai-advice">분석 중입니다...</p>
                </div>
            </section>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
