<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Crab-Finance: 꽃게머니</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #fb923c;
            --text: #1e293b;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 2rem; }
        .dashboard { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.5fr; gap: 2rem; }
        .card { background: var(--card); padding: 2rem; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-top: 4px solid var(--primary); }
        .savings-box {
            background: #fff7ed;
            padding: 1.5rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            text-align: center;
            border: 2px dashed var(--primary);
        }
        .savings-amount { font-size: 2rem; font-weight: 900; color: #ea580c; }
        h1 { color: var(--primary); margin-top: 0; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .input-group { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
        input { padding: 0.8rem; border: 1px solid #cbd5e1; border-radius: 10px; }
        button { background: var(--primary); color: white; border: none; padding: 1rem; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .advice-box { margin-top: 2rem; padding: 1rem; background: #fff7ed; border-left: 4px solid var(--primary); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="card">
            <h1>🦀💰 Crab-Finance</h1>
            <div class="savings-box">
                <div style="font-size: 0.9rem; color: #9a3412; margin-bottom: 0.5rem;">🦀 꽃게가 지켜낸 보물 (누적 절약액)</div>
                <div class="savings-amount">₩ 152,400</div>
                <div style="font-size: 0.8rem; opacity: 0.7;">지난달 대비 12% 증가!</div>
            </div>
            <p>지능형 소비 분석 대시보드</p>
            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>
            <div id="aiAdvice" class="advice-box">
                <b>💡 AI 한줄 조언:</b><br>데이터를 분석 중입니다...
            </div>
        </div>
        
        <div class="card">
            <h2>내역 추가</h2>
            <div class="input-group">
                <input type="text" id="expenseText" placeholder="예: '스타벅스 커피 5500원'">
                <button onclick="addExpense()">분석 및 추가</button>
            </div>
            <ul id="expenseList" style="list-style:none; padding:0; margin-top: 2rem;"></ul>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('expenseChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['식비', '교통', '취미', '주거', '기타'],
                datasets: [{
                    data: [45, 12, 8, 60, 5],
                    backgroundColor: ['#fb923c', '#38bdf8', '#f472b6', '#a78bfa', '#94a3b8']
                }]
            }
        });

        function addExpense() {
            const text = document.getElementById('expenseText').value;
            if(!text) return;
            
            // 시뮬레이션
            const li = document.createElement('li');
            li.style.padding = '0.8rem';
            li.style.borderBottom = '1px solid #eee';
            li.innerText = `✔️ ${text} (분류 완료)`;
            document.getElementById('expenseList').prepend(li);
            document.getElementById('expenseText').value = '';
            
            document.getElementById('aiAdvice').innerHTML = "<b>💡 AI 한줄 조언:</b><br>식비 지출이 이번 주 목표치보다 15% 높습니다. 집밥 빈도를 높여보세요!";
        }
    </script>
</body>
</html>
