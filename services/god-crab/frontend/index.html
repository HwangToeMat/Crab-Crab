<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>갓게 (God-Crab) - 당신의 갓생 파트너</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h1><span class="crab-icon">🦀</span> <span data-i18n="title">갓게 (God-Crab)</span></h1>
                <div>
                    <button id="lang-toggle" style="background:none; font-size: 1rem;">🌐 EN</button>
                    <button id="theme-toggle" style="background:none; font-size: 1.5rem;">🌓</button>
                </div>
            </div>
            <div id="crab-info">
                <span id="crab-name">크래비</span> <button id="rename-btn" style="padding: 2px 5px; font-size: 0.7rem;">✏️</button> (LV.<span id="crab-level">1</span>)
                <div class="progress-bar"><div id="crab-exp" style="width: 40%;"></div></div>
                <p id="crab-saying" style="font-style: italic; color: var(--primary); margin-top: 10px;">"오늘도 껍질을 깨고 성장해봐요!"</p>
                <div id="badges" style="margin-top: 10px; font-size: 1.2rem;">🏅 🐣</div>
            </div>
        </header>

        <main>
            <section id="habit-list">
                <h2>오늘의 갓생 할 일</h2>
                <ul id="tasks"></ul>
                <div class="add-task">
                    <input type="text" id="new-task-title" placeholder="새로운 습관을 입력하세요...">
                    <button id="add-task-btn">+</button>
                </div>
                <div id="templates" style="margin-top: 15px; display: flex; gap: 5px; flex-wrap: wrap;">
                    <button class="tmpl-btn" data-title="💧 물 500ml 마시기" style="font-size: 0.8rem; background: #eee; color: #333;">💧 물</button>
                    <button class="tmpl-btn" data-title="💊 영양제 챙기기" style="font-size: 0.8rem; background: #eee; color: #333;">💊 영양제</button>
                    <button class="tmpl-btn" data-title="📖 책 10페이지 읽기" style="font-size: 0.8rem; background: #eee; color: #333;">📖 독서</button>
                    <button class="tmpl-btn" data-title="🧘 명상 5분" style="font-size: 0.8rem; background: #eee; color: #333;">🧘 명상</button>
                </div>
            </section>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
