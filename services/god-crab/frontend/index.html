<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>갓게 (God-Crab) Evolution - 마스터 대시보드</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
    <div id="app">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <h1><span class="crab-icon">🦀</span> GOD-CRAB</h1>
                <div id="user-stats-hud">
                    <span id="user-points" style="color: var(--color-neon-gold); font-weight: 800; font-size: 1.1rem;">💰 5,000 P</span>
                </div>
            </div>
            <div id="crab-info">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px;">
                    <span id="crab-name" style="font-size: 1.2rem; font-weight: 800; color: var(--color-neon-cyan);">진화의꽃게</span>
                    <span style="font-size: 0.9rem; font-weight: 700;">LV.<span id="crab-level">1</span> <span style="color: #F87171;">🔥 7</span></span>
                </div>
                <div class="progress-bar"><div id="crab-exp" style="width: 40%;"></div></div>
            </div>
        </header>

        <section id="ai-coach-section">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                <span style="font-size: 1.2rem;">✨</span>
                <h3 style="margin: 0; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;">AI Master's Advice</h3>
            </div>
            <p id="ai-advice">"작은 습관의 반복이 당신을 신의 경지로 인도할 것입니다."</p>
            <button id="ask-ai-btn" class="btn-primary" style="width: 100%; padding: 10px; border-radius: 10px; margin-top: 10px; cursor: pointer;">진화 조언 받기</button>
        </section>

        <nav>
            <button class="tab-btn active" data-tab="habit-list" style="flex:1; border:none; padding: 12px; cursor:pointer; font-weight:800;">HABITS</button>
            <button class="tab-btn" data-tab="league-view" style="flex:1; border:none; padding: 12px; cursor:pointer; font-weight:800;">LEAGUE</button>
            <button class="tab-btn" data-tab="ambassador-view" style="flex:1; border:none; padding: 12px; cursor:pointer; font-weight:800;">MASTERS</button>
        </nav>

        <main>
            <section id="habit-list" class="tab-content">
                <div id="tasks" style="margin-bottom: 20px;">
                    <!-- Tasks will be rendered here -->
                </div>
                <div class="add-task-container" style="background: var(--color-bg-card); padding: 15px; border-radius: 15px;">
                    <input type="text" id="new-task-title" placeholder="새로운 진화 목표를 입력하세요..." style="margin-bottom: 10px;">
                    <div id="templates" style="display: flex; gap: 8px; flex-wrap: wrap;">
                        <button class="tmpl-btn" data-title="💧 물 500ml 마시기" style="background: #334155; border:none; color:white; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; cursor:pointer;">💧 물</button>
                        <button class="tmpl-btn" data-title="📖 독서 10분" style="background: #334155; border:none; color:white; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; cursor:pointer;">📖 독서</button>
                        <button class="tmpl-btn" data-title="🧘 명상 5분" style="background: #334155; border:none; color:white; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; cursor:pointer;">🧘 명상</button>
                    </div>
                </div>
            </section>

            <section id="league-view" class="tab-content" style="display: none;">
                <div style="background: linear-gradient(90deg, #713709 0%, #0F172A 100%); padding: 15px; border-radius: 15px; margin-bottom: 20px; border-left: 4px solid var(--color-neon-gold);">
                    <div style="font-weight:800; color: var(--color-neon-gold); font-size: 0.9rem;">WEEKLY CHAMPION REWARD</div>
                    <div style="font-size: 1.2rem; font-weight: 900;">💰 10,000 P + 👑 Title</div>
                </div>
                <div id="rankings-list">
                    <!-- Rankings will be rendered here -->
                </div>
            </section>

            <section id="ambassador-view" class="tab-content" style="display: none;">
                <div id="ambassadors-list">
                    <!-- Ambassadors will be rendered here -->
                </div>
            </section>
        </main>

        <footer style="margin-top: 30px; text-align: center; opacity: 0.5; font-size: 0.8rem;">
            &copy; 2026 CRABTEAM INFINITE EVOLUTION
        </footer>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
