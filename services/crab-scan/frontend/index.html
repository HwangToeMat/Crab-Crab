<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crab-Scan v2.0 ∞ - AI 지능형 소비 관리</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Crab-Scan <span style="font-size:0.8rem; color:#7F00FF;">v2.0 ∞</span></h1>
            <div id="saving-score-card" class="card">
                <h3>갓생 절약 점수: <span id="saving-score">85</span>점</h3>
                <div class="score-meter"><div id="score-fill"></div></div>
                <p id="crab-streak" style="font-size:0.8rem; color:#999; margin-top:5px;">🔥 <span id="streak-days">12</span>일 연속 갓생 중</p>
            </div>
        </header>

        <main>
            <section id="ai-scan-section" class="card">
                <h3>지능형 영수증 분석 🤖</h3>
                <div class="input-group">
                    <input type="text" id="expense-name" placeholder="항목명 (예: 치킨 🍗)">
                    <input type="number" id="expense-price" placeholder="금액 (KRW)">
                </div>
                <div style="margin: 10px 0;">
                    <label style="font-size:0.8rem;"><input type="checkbox" id="is-essential" checked> 필수 지출인가요?</label>
                </div>
                <button id="scan-btn">AI 크랩에게 조언 받기</button>
                <div id="ai-insight" class="ai-insight" style="display: none;">
                    <strong>🦀 AI 크랩의 조언:</strong>
                    <p id="ai-advice-text"></p>
                </div>
            </section>

            <section id="expense-history" class="card">
                <h3>최근 소비 내역 <span id="total-spent" style="float:right; font-size:0.8rem; color:#7F00FF;">💰 450,000</span></h3>
                <ul id="expense-list"></ul>
            </section>

            <section id="quest-section" class="card">
                <h3>오늘의 갓생 퀘스트 🐚</h3>
                <div id="quest-list"></div>
            </section>

            <section id="ranking-section" class="card">
                <h3>주간 절약왕 랭킹 🏆</h3>
                <div id="ranking-list"></div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
