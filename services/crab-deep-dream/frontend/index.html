<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crab-Deep-Dream | AI Sleep Coach</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dream-container">
        <header>
            <h1 class="glow-text">🌙 CRAB-DEEP-DREAM</h1>
            <p class="subtitle">지능형 수면 코칭 및 멘탈 케어</p>
        </header>

        <main>
            <section id="sleep-input-card" class="card glass">
                <h2>오늘의 수면 로그</h2>
                <div class="input-group">
                    <label>수면 시간 (시간)</label>
                    <input type="number" id="sleep-duration" placeholder="예: 7.5" step="0.5">
                </div>
                <div class="input-group">
                    <label>수면의 질 (1-10)</label>
                    <input type="range" id="sleep-quality" min="1" max="10" value="5">
                </div>
                <div class="input-group">
                    <label>특이사항</label>
                    <input type="text" id="sleep-note" placeholder="카페인 섭취, 야근 등">
                </div>
                <button id="log-btn">꿈 기록하기</button>
            </section>

            <section id="ai-coach-card" class="card glass hidden">
                <h2 id="coach-title">AI 수면 분석</h2>
                <div id="ai-result">
                    <p id="analysis-text" class="insight"></p>
                    <p id="sound-tip" class="sound-chip"></p>
                </div>
            </section>

            <section id="history-card" class="card glass">
                <h2>최근 수면 기록</h2>
                <ul id="history-list">
                    <!-- History items will be injected here -->
                </ul>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 CrabTeam - Deep Dream v2.0 EVO</p>
        </footer>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
