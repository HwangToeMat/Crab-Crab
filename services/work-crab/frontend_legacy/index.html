<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work-Crab | Infinite Evolution</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [tasks, setTasks] = useState([
                { id: 1, title: "Q3 Strategy Planning", priority: "High", status: "Todo", warranted: true },
                { id: 2, title: "Review PRs", priority: "Mid", status: "Done", warranted: false }
            ]);
            const [burnout, setBurnout] = useState({ energy_level: 80, status: "Infinite Flow", recommendation: "Maintain Deep Work." });
            const [aiAdvice, setAiAdvice] = useState("AI 엔진 대기 중...");
            const [userPoints, setUserPoints] = useState(10000);
            
            const handleAskAI = () => {
                setAiAdvice("Infinite AI가 당신의 뇌파 패턴과 업무 밀도를 분석 중입니다...");
                setTimeout(() => {
                    setAiAdvice("Infinite AI 분석 결과: 현재 1개의 핵심 업무가 있습니다. 가장 집중력이 높은 오전 시간에 창의적인 작업을 먼저 수행하고, 오후에는 반복 작업을 배치하세요. 당신의 무한한 생산성을 응원합니다!");
                }, 1500);
            };

            const toggleTask = (id) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, status: t.status === "Done" ? "Todo" : "Done" } : t));
            };

            const applyWarranty = (id) => {
                if (userPoints >= 500) {
                    setUserPoints(p => p - 500);
                    setTasks(tasks.map(t => t.id === id ? { ...t, warranted: true } : t));
                    alert("500 포인트 스테이킹 완료! 성공 시 두 배 보상 🛡️");
                } else {
                    alert("포인트가 부족합니다.");
                }
            };

            return (
                <div className="container">
                    <header>
                        <div style={{ textAlign: 'right', marginBottom: '-30px', color: '#FFDC00', fontWeight: 'bold' }}>
                            💰 {userPoints} CP
                        </div>
                        <h1>Work-Crab ♾️</h1>
                        <p style={{ opacity: 0.8 }}>Infinite Evolution (Phase 5)</p>
                    </header>

                    <section className="ai-coach-panel">
                        <h3 style={{ color: '#7F00FF', margin: '0 0 10px 0' }}>🤖 Infinite AI Coach</h3>
                        <p style={{ fontSize: '0.9rem', marginBottom: '15px' }}>{aiAdvice}</p>
                        <button onClick={handleAskAI} style={{ width: '100%', background: '#7F00FF' }}>초정밀 분석 요청</button>
                    </section>

                    <section className="burnout-gauge">
                        <h2>Energy Nexus</h2>
                        <div className="gauge-container">
                            <div className="gauge-bar"></div>
                            <div className="gauge-progress" style={{ transform: `rotate(${45 + (burnout.energy_level * 1.8)}deg)` }}></div>
                        </div>
                        <div className="gauge-text">
                            <h3 style={{ color: burnout.energy_level > 50 ? '#06D6A0' : '#FF5722' }}>
                                {burnout.energy_level}% - {burnout.status}
                            </h3>
                            <p style={{ fontSize: '0.9rem', opacity: 0.7 }}>{burnout.recommendation}</p>
                        </div>
                    </section>

                    <section className="tasks-section">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '15px' }}>
                            <h2>Infinite Tasks</h2>
                            <button style={{ padding: '5px 12px', fontSize: '0.8rem' }}>+ Add</button>
                        </div>
                        {tasks.map(task => (
                            <div key={task.id} className="task-card">
                                <div style={{ flex: 1 }}>
                                    <h3 style={{ margin: '0 0 5px 0', textDecoration: task.status === "Done" ? 'line-through' : 'none', opacity: task.status === "Done" ? 0.5 : 1 }}>
                                        {task.title}
                                        {task.warranted && <span className="warranty-badge">🛡️ Warranty</span>}
                                    </h3>
                                    <span style={{ fontSize: '0.8rem', color: '#888' }}>Priority: {task.priority}</span>
                                </div>
                                <div style={{ display: 'flex', gap: '5px' }}>
                                    {!task.warranted && task.status !== "Done" && (
                                        <button onClick={() => applyWarranty(task.id)} style={{ padding: '5px 10px', fontSize: '0.7rem', background: '#333' }}>Stake</button>
                                    )}
                                    <button onClick={() => toggleTask(task.id)} style={{ padding: '5px 10px', fontSize: '0.8rem' }}>
                                        {task.status === "Done" ? "Undo" : "Done"}
                                    </button>
                                </div>
                            </div>
                        ))}
                    </section>

                    <section className="ambassador-section">
                        <h2>Crab Ambassadors 🌟</h2>
                        <p style={{ fontSize: '0.8rem', opacity: 0.7 }}>전문가의 업무 트랙을 동기화하세요.</p>
                        
                        <div className="ambassador-card">
                            <h4 style={{ margin: '0 0 5px 0', color: '#06D6A0' }}>Elon Crab</h4>
                            <p style={{ margin: '0 0 10px 0', fontSize: '0.85rem' }}>Track: 100-Hour Work Week (Hardcore)</p>
                            <button style={{ width: '100%', padding: '5px', fontSize: '0.8rem', background: '#3A4E7A' }}>Sync Track</button>
                        </div>
                        
                        <div className="ambassador-card">
                            <h4 style={{ margin: '0 0 5px 0', color: '#FFDC00' }}>Zen Crab</h4>
                            <p style={{ margin: '0 0 10px 0', fontSize: '0.85rem' }}>Track: Deep Work & Meditation</p>
                            <button style={{ width: '100%', padding: '5px', fontSize: '0.8rem', background: '#3A4E7A' }}>Sync Track</button>
                        </div>
                    </section>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
