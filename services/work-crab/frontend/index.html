<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work-Crab | 당신의 갓생 파트너</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const i18n = {
            ko: {
                title: "Work-Crab",
                slogan: "게으르지 않게, 하지만 지치지 않게.",
                energy: "나의 에너지 상태",
                tasks: "오늘의 할 일",
                diary: "감정 회고",
                voice: "🎤 음성 입력",
                focus: "집중 시작",
                break: "짧은 휴식",
                share: "📸 오늘의 갓생 인스타 공유하기",
                save: "오늘의 회고 저장하기",
                achievements: "획득한 업적",
                stats: "주간 활동 추이"
            },
            en: {
                title: "Work-Crab",
                slogan: "Not lazy, but not exhausted.",
                energy: "My Energy Status",
                tasks: "Today's Tasks",
                diary: "Emotion Review",
                voice: "🎤 Voice",
                focus: "Start Focus",
                break: "Short Break",
                share: "📸 Share on Instagram",
                save: "Save Daily Review",
                achievements: "Achievements",
                stats: "Weekly Activity"
            },
            ja: {
                title: "ワーククラブ",
                slogan: "怠けず、しかし疲れず。",
                energy: "マイエネルギーステータス",
                tasks: "今日のタスク",
                diary: "感情回顧",
                voice: "🎤 音声入力",
                focus: "集中開始",
                break: "短い休憩",
                share: "📸 インスタで共有する",
                save: "今日の振り返りを保存",
                achievements: "獲得した実績",
                stats: "週間活動推移"
            }
        };

        function App() {
            const [lang, setLang] = useState('ko');
            const [tasks, setTasks] = useState([]);
            const t = i18n[lang];
            const [burnout, setBurnout] = useState({ energy_level: 80, status: "Healthy", recommendation: "Keep it up!" });
            const [diary, setDiary] = useState("");
            const [timer, setTimer] = useState(1500); // 25 mins default
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(false);
            const userId = 1; // Mock user ID

            useEffect(() => {
                document.body.className = isDarkMode ? 'dark-mode' : '';
            }, [isDarkMode]);

            useEffect(() => {
                let interval = null;
                if (isTimerRunning && timer > 0) {
                    interval = setInterval(() => {
                        setTimer(timer => timer - 1);
                    }, 1000);
                } else if (timer === 0) {
                    setIsTimerRunning(false);
                    alert("Time for a break! Crab says: Stretch your legs!");
                }
                return () => clearInterval(interval);
            }, [isTimerRunning, timer]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            };

            const handleDiarySubmit = () => {
                alert("일기가 등록되었습니다! AI 분석 결과: 긍정적");
                setDiary("");
                setBurnout({ ...burnout, energy_level: 85 });
            };

            const addHabitTemplate = (type) => {
                const templates = {
                    miracle: [
                        { id: Date.now() + 1, title: "기상 및 침구 정리", priority: "Mid", status: "Todo" },
                        { id: Date.now() + 2, title: "명상 10분", priority: "Low", status: "Todo" },
                        { id: Date.now() + 3, title: "독서 30분", priority: "High", status: "Todo" }
                    ],
                    health: [
                        { id: Date.now() + 4, title: "물 2L 마시기", priority: "Low", status: "Todo" },
                        { id: Date.now() + 5, title: "스트레칭", priority: "Mid", status: "Todo" },
                        { id: Date.now() + 6, title: "헬스장 가기", priority: "High", status: "Todo" }
                    ]
                };
                setTasks([...tasks, ...templates[type]]);
                alert(`${type === 'miracle' ? '미라클 모닝' : '건강 챙기기'} 템플릿이 추가되었습니다!`);
            };

            const toggleTask = (id) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, status: t.status === "Done" ? "Todo" : "Done" } : t));
            };

            return (
                <div className="container">
                    <header>
                        <div style={{ textAlign: 'right', marginBottom: '-30px', display: 'flex', justifyContent: 'flex-end', gap: '10px' }}>
                            <select onChange={(e) => setLang(e.target.value)} value={lang} style={{ background: 'transparent', color: 'white', border: '1px solid rgba(255,255,255,0.3)', borderRadius: '5px' }}>
                                <option value="ko">KR</option>
                                <option value="en">EN</option>
                                <option value="ja">JP</option>
                            </select>
                            <button onClick={() => setIsDarkMode(!isDarkMode)} style={{ background: 'transparent', boxShadow: 'none', fontSize: '1.2rem' }}>
                                {isDarkMode ? '🌙' : '☀️'}
                            </button>
                        </div>
                        <h1>{t.title}</h1>
                        <p>{t.slogan}</p>
                    </header>


                    <section className="burnout-gauge">
                        <h2>{t.energy}</h2>
                        {/* ... */}
                        <div className="gauge-text">
                            <h3>{burnout.energy_level}% - {burnout.status}</h3>
                            <p>{burnout.recommendation}</p>
                        </div>
                        
                        <div className="timer-section" style={{ marginTop: '20px', padding: '15px', background: '#f9f9f9', borderRadius: '12px' }}>
                            <div style={{ fontSize: '2rem', fontWeight: 'bold', color: isTimerRunning ? '#FF5722' : '#333' }}>
                                {formatTime(timer)}
                            </div>
                            <button 
                                onClick={() => setIsTimerRunning(!isTimerRunning)} 
                                style={{ marginTop: '10px', background: isTimerRunning ? '#333' : '#FF5722' }}
                            >
                                {isTimerRunning ? "Pause" : t.focus}
                            </button>
                            <button onClick={() => { setTimer(300); setIsTimerRunning(true); }} style={{ marginLeft: '10px', background: '#1A237E' }}>
                                {t.break}
                            </button>
                        </div>

                        <div className="stats-mini" style={{ marginTop: '20px', padding: '15px', border: '1px solid #eee', borderRadius: '12px' }}>
                            <h4 style={{ margin: '0 0 10px 0', fontSize: '0.9rem' }}>{t.stats}</h4>
                            {/* ... chart code ... */}
                        </div>
                        
                        <div className="achievements-mini" style={{ marginTop: '20px', borderTop: '1px solid #eee', paddingTop: '15px' }}>
                            <h4 style={{ margin: '0 0 10px 0', fontSize: '0.9rem' }}>{t.achievements}</h4>
                            {/* ... icons ... */}
                        </div>
                    </section>




                    <section className="tasks-section">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <h2>{t.tasks}</h2>
                            <button onClick={() => alert("Listening...")} style={{ background: '#1A237E', padding: '5px 12px' }}>
                                {t.voice}
                            </button>
                        </div>
                        {/* ... tasks map ... */}
                        {tasks.map(task => (
                            <div key={task.id} className="task-card">
                                <div className="task-info">
                                    <h3 style={{ textDecoration: task.status === "Done" ? 'line-through' : 'none', opacity: task.status === "Done" ? 0.5 : 1 }}>
                                        {task.title}
                                    </h3>
                                    <span className={`priority-tag priority-${task.priority.toLowerCase()}`}>{task.priority}</span>
                                </div>
                                <button onClick={() => toggleTask(task.id)}>
                                    {task.status === "Done" ? "Undo" : "Done"}
                                </button>
                            </div>
                        ))}
                    </section>


                    <section className="diary-section">
                        <h2>{t.diary}</h2>
                        <textarea 
                            className="diary-input" 
                            placeholder="Share your feelings today..."
                            value={diary}
                            onChange={(e) => setDiary(e.target.value)}
                        ></textarea>
                        <button onClick={handleDiarySubmit} style={{ width: '100%', marginBottom: '15px' }}>{t.save}</button>
                        
                        <button 
                            onClick={() => alert("Instagram Sharing...")} 
                            style={{ width: '100%', background: 'linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%)', fontWeight: 'bold' }}
                        >
                            {t.share}
                        </button>
                    </section>


                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
