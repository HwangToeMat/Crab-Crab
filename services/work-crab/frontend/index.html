<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work-Crab | 당신의 갓생 파트너</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [tasks, setTasks] = useState([]);
            const [burnout, setBurnout] = useState({ energy_level: 80, status: "Healthy", recommendation: "Keep it up!" });
            const [diary, setDiary] = useState("");
            const userId = 1; // Mock user ID

            useEffect(() => {
                // Initial data fetch (Mock for prototype)
                setTasks([
                    { id: 1, title: "기획서 작성", priority: "High", status: "InProgress" },
                    { id: 2, title: "주간 회의", priority: "Mid", status: "Todo" },
                    { id: 3, title: "운동 30분", priority: "Low", status: "Todo" }
                ]);
            }, []);

            const handleDiarySubmit = () => {
                alert("일기가 등록되었습니다! AI 분석 결과: 긍정적");
                setDiary("");
                setBurnout({ ...burnout, energy_level: 85 });
            };

            const toggleTask = (id) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, status: t.status === "Done" ? "Todo" : "Done" } : t));
            };

            return (
                <div className="container">
                    <header>
                        <h1>Work-Crab</h1>
                        <p>게으르지 않게, 하지만 지치지 않게.</p>
                    </header>

                    <section className="burnout-gauge">
                        <h2>나의 에너지 상태</h2>
                        <div className="gauge-container">
                            <div className="gauge-bar"></div>
                            <div className="gauge-progress" style={{ transform: `rotate(${45 + (burnout.energy_level * 1.8)}deg)` }}></div>
                        </div>
                        <div className="gauge-text">
                            <h3>{burnout.energy_level}% - {burnout.status}</h3>
                            <p>{burnout.recommendation}</p>
                        </div>
                    </section>

                    <section className="tasks-section">
                        <h2>오늘의 할 일</h2>
                        {tasks.map(task => (
                            <div key={task.id} className="task-card">
                                <div className="task-info">
                                    <h3 style={{ textDecoration: task.status === "Done" ? 'line-through' : 'none', opacity: task.status === "Done" ? 0.5 : 1 }}>
                                        {task.title}
                                    </h3>
                                    <span className={`priority-tag priority-${task.priority.toLowerCase()}`}>{task.priority}</span>
                                </div>
                                <button onClick={() => toggleTask(task.id)}>
                                    {task.status === "Done" ? "취소" : "완료"}
                                </button>
                            </div>
                        ))}
                    </section>

                    <section className="diary-section">
                        <h2>감정 회고</h2>
                        <textarea 
                            className="diary-input" 
                            placeholder="오늘 하루는 어땠나요? 당신의 감정을 들려주세요."
                            value={diary}
                            onChange={(e) => setDiary(e.target.value)}
                        ></textarea>
                        <button onClick={handleDiarySubmit} style={{ width: '100%' }}>오늘의 회고 저장하기</button>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
