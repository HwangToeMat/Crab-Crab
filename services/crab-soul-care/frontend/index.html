<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crab-Soul-Care | AI 멘탈 웰니스</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div id="crab-mascot" class="mascot">🦀</div>
            <h1>Crab-Soul-Care</h1>
            <p>Gemini AI 기반 정서 안정 및 마인드풀니스 가이드</p>
        </header>

        <section class="coach-section card">
            <h2>Emotion Mirror</h2>
            <p>지금 당신의 마음 상태를 짧게 적어보세요.</p>
            <textarea id="emotion-input" placeholder="예: 오늘 하루가 너무 힘들었어요. 조용한 바다를 보고 싶네요."></textarea>
            <button id="analyze-btn" class="btn">분석 및 테라피 시작</button>
        </section>

        <section id="result-section" class="card hidden">
            <div class="result-header">
                <div id="emotion-badge" class="badge">Happy</div>
                <h3 id="ai-coach-title">AI Wellness Coach</h3>
            </div>
            <p id="ai-msg"></p>
            <div id="therapy-card" class="therapy-card">
                <h4>Soul Soundscape: <span id="sound-name"></span></h4>
                <p id="therapy-tip"></p>
                <div class="sound-visualizer">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 CrabTeam - Mental Wellness Evolution</p>
        </footer>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
