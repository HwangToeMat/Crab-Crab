<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소소행 (Soso-Haeng)</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-orange-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [posts, setPosts] = useState([]);
            const [content, setContent] = useState('');
            const [mood, setMood] = useState('happy');
            const [chatSession, setChatSession] = useState(null);
            const [messages, setMessages] = useState([]);
            const [msgInput, setMsgInput] = useState('');
            const [userId] = useState(() => {
                const saved = localStorage.getItem('soso_user_id');
                if (saved) return saved;
                const newId = 'user-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('soso_user_id', newId);
                return newId;
            });
            const [userProfile, setUserProfile] = useState(null);
            const [socket, setSocket] = useState(null);
            const [now, setNow] = useState(Date.now());
            const [view, setView] = useState('feed'); // 'feed' or 'profile'
            const [onlineCount, setOnlineCount] = useState(0);
            const [isPosting, setIsPosting] = useState(false);
            const [isMatching, setIsMatching] = useState(false);

            useEffect(() => {
                fetchPosts();
                fetchProfile();
                const newSocket = io('http://localhost:4000');
                setSocket(newSocket);
                
                newSocket.on('receive_message', (data) => {
                    setMessages(prev => [...prev, data]);
                });

                newSocket.on('chat_history', (history) => {
                    setMessages(history);
                });

                newSocket.on('online_count', (count) => {
                    setOnlineCount(count);
                });

                const timer = setInterval(() => setNow(Date.now()), 1000);

                return () => {
                    newSocket.close();
                    clearInterval(timer);
                };
            }, []);

            const fetchPosts = async () => {
                try {
                    const res = await fetch('http://localhost:4000/api/posts');
                    const data = await res.json();
                    setPosts(data);
                } catch (err) {
                    console.error(err);
                }
            };

            const fetchProfile = async () => {
                try {
                    const res = await fetch(`http://localhost:4000/api/users/${userId}/profile`);
                    const data = await res.json();
                    setUserProfile(data);
                } catch (err) {
                    console.error(err);
                }
            };

            const getTimeRemaining = (createdAt) => {
                const created = new Date(createdAt).getTime();
                const expiry = created + (24 * 60 * 60 * 1000);
                const remaining = expiry - now;
                if (remaining <= 0) return '만료됨';
                
                const hours = Math.floor(remaining / (1000 * 60 * 60));
                const mins = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((remaining % (1000 * 60)) / 1000);
                return `${hours}시간 ${mins}분 ${secs}초 남음`;
            };

            const createPost = async () => {
                if (!content || isPosting) return;
                setIsPosting(true);
                try {
                    await fetch('http://localhost:4000/api/posts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            content, 
                            authorId: userId,
                            nickname: userProfile?.nickname,
                            mood
                        })
                    });
                    setContent('');
                    fetchPosts();
                    fetchProfile();
                } catch (err) {
                    alert('전송 실패. 다시 시도해주세요.');
                } finally {
                    setIsPosting(false);
                }
            };

            const refreshNickname = async () => {
                const res = await fetch(`http://localhost:4000/api/users/${userId}/nickname/refresh`, { method: 'POST' });
                const data = await res.json();
                setUserProfile(prev => ({ ...prev, nickname: data.nickname }));
            };

            const likePost = async (e, postId) => {
                e.stopPropagation();
                await fetch(`http://localhost:4000/api/posts/${postId}/like`, { method: 'POST' });
                fetchPosts();
                fetchProfile();
            };

            const reportPost = async (e, postId) => {
                e.stopPropagation();
                if (confirm('이 글을 신고하시겠습니까? 5회 이상 신고된 글은 자동으로 삭제됩니다.')) {
                    await fetch(`http://localhost:4000/api/posts/${postId}/report`, { method: 'POST' });
                    fetchPosts();
                }
            };

            const matchChat = async (postId) => {
                if (isMatching) return;
                setIsMatching(true);
                try {
                    const res = await fetch('http://localhost:4000/api/chat/match', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ postId, userId })
                    });
                    const data = await res.json();
                    if (data.matched) {
                        setChatSession(data.sessionId);
                        socket.emit('join_chat', data.sessionId);
                        fetchProfile();
                    } else {
                        alert('따뜻한 대화를 기다리는 중입니다... (1분 내 매칭)');
                    }
                } catch (err) {
                    alert('매칭 중 오류가 발생했습니다.');
                } finally {
                    setIsMatching(false);
                }
            };

            const sendMessage = () => {
                if (!msgInput || !chatSession) return;
                socket.emit('send_message', { 
                    sessionId: chatSession, 
                    message: msgInput, 
                    senderId: userId 
                });
                setMsgInput('');
            };

            if (chatSession) {
                return (
                    <div class="max-w-md mx-auto p-4 flex flex-col h-screen bg-orange-50/50">
                        <header class="flex justify-between items-center py-4 border-b bg-white px-4 rounded-t-3xl shadow-sm">
                            <div class="flex flex-col">
                                <h1 class="text-xl font-bold text-orange-600">따뜻한 소통 중</h1>
                                <span class="text-xs text-gray-400 font-bold">익명 대화는 1시간 후 사라집니다</span>
                            </div>
                            <button onClick={() => {
                                if(confirm('대화를 종료할까요?')) setChatSession(null);
                            }} class="text-gray-400 font-bold p-2 hover:text-red-500 transition">닫기</button>
                        </header>
                        <div class="flex-grow overflow-y-auto py-6 px-4 space-y-6">
                            {messages.map((m, i) => (
                                <div key={i} class={`flex ${m.senderId === userId ? 'justify-end' : 'justify-start'}`}>
                                    <div class={`group relative p-4 rounded-2xl max-w-[85%] text-lg shadow-sm ${m.senderId === userId ? 'bg-orange-500 text-white rounded-tr-none' : 'bg-white text-black rounded-tl-none'}`}>
                                        {m.message}
                                        <span class={`absolute bottom-[-20px] text-[10px] font-bold ${m.senderId === userId ? 'right-0 text-orange-400' : 'left-0 text-gray-300'}`}>
                                            {m.timestamp ? new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : ''}
                                        </span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div class="bg-white p-4 rounded-b-3xl shadow-lg border-t space-y-4">
                            <div class="flex space-x-2 overflow-x-auto pb-2">
                                {['👏 대단해요!', '❤️ 공감해요', '🙏 감사해요', '😊 행복하세요', '👍 응원합니다'].map(emoji => (
                                    <button 
                                        key={emoji}
                                        onClick={() => {
                                            socket.emit('send_message', { sessionId: chatSession, message: emoji, senderId: userId });
                                        }}
                                        class="whitespace-nowrap bg-orange-50 text-orange-600 px-3 py-1 rounded-full text-sm font-bold border border-orange-100"
                                    >
                                        {emoji}
                                    </button>
                                ))}
                            </div>
                            <div class="flex space-x-2">
                                <input 
                                    value={msgInput} 
                                    onChange={(e) => setMsgInput(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                                    placeholder="따뜻한 마음을 전하세요..." 
                                    class="flex-grow p-4 border-none bg-gray-100 rounded-2xl text-lg focus:ring-2 focus:ring-orange-300 outline-none"
                                />
                                <button onClick={sendMessage} class="bg-orange-600 text-white px-6 py-2 rounded-2xl font-black shadow-md hover:bg-orange-700">전송</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'profile') {
                return (
                    <div class="max-w-md mx-auto p-4 bg-white h-screen">
                        <header class="flex items-center justify-between py-8 border-b">
                            <div class="flex items-center space-x-4">
                                <button onClick={() => setView('feed')} class="text-2xl text-orange-600 font-bold">←</button>
                                <h1 class="text-3xl font-black text-orange-600">내 정보</h1>
                            </div>
                            <button onClick={refreshNickname} class="text-sm bg-gray-100 px-3 py-1 rounded-full font-bold text-gray-600">별명 변경</button>
                        </header>
                        <div class="py-12 text-center">
                            <div class="text-6xl mb-6">🌞</div>
                            <h2 class="text-3xl font-bold text-gray-800 mb-2">{userProfile?.nickname}</h2>
                            <p class="text-gray-400 mb-10">당신은 따뜻한 행복을 나누는 분이시군요!</p>
                            
                            <div class="grid grid-cols-3 gap-4">
                                <div class="bg-orange-50 p-6 rounded-3xl">
                                    <p class="text-gray-500 text-sm font-bold mb-2">받은 박수</p>
                                    <p class="text-4xl font-black text-orange-600">{userProfile?.stats.totalLikes}</p>
                                </div>
                                <div class="bg-orange-50 p-6 rounded-3xl">
                                    <p class="text-gray-500 text-sm font-bold mb-2">나눈 대화</p>
                                    <p class="text-4xl font-black text-orange-600">{userProfile?.stats.totalChats}</p>
                                </div>
                                <div class="bg-orange-50 p-6 rounded-3xl">
                                    <p class="text-gray-500 text-sm font-bold mb-2">행복 지수</p>
                                    <p class="text-4xl font-black text-orange-600">{userProfile?.stats.happinessLevel}</p>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <h3 class="text-xl font-black text-gray-800">나의 행복 기록</h3>
                            <div class="space-y-4 overflow-y-auto max-h-[40vh]">
                                {posts.filter(p => p.authorId === userId).map(post => (
                                    <div key={post.id} class="bg-orange-50 p-6 rounded-2xl border border-orange-100">
                                        <p class="text-lg text-gray-700">{post.content}</p>
                                        <div class="flex justify-between mt-4 text-xs text-orange-400 font-bold">
                                            <span>{getTimeRemaining(post.createdAt)}</span>
                                            <span>👏 {post.likes}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div class="max-w-md mx-auto p-4 pb-20">
                    <header class="py-8 flex justify-between items-center">
                        <div>
                            <h1 class="text-4xl font-black text-orange-600 tracking-tight">소소행</h1>
                            <div class="flex items-center space-x-2 mt-1">
                                <p class="text-orange-400 font-medium">따뜻한 행복이 머무는 곳</p>
                                <span class="bg-green-100 text-green-600 text-[10px] px-2 py-0.5 rounded-full font-bold">● {onlineCount}명 접속 중</span>
                            </div>
                        </div>
                        <button 
                            onClick={() => setView('profile')}
                            class="bg-white border-2 border-orange-100 p-3 rounded-full text-2xl shadow-sm hover:bg-orange-50 transition"
                        >
                            🌞
                        </button>
                    </header>

                    <div class="bg-white p-6 rounded-3xl shadow-xl shadow-orange-100 mb-10 border border-orange-50">
                        <div class="flex space-x-2 mb-4">
                            {['happy', 'grateful', 'calm', 'excited'].map(m => (
                                <button 
                                    key={m}
                                    onClick={() => setMood(m)}
                                    class={`px-4 py-2 rounded-full text-sm font-bold transition ${mood === m ? 'bg-orange-500 text-white' : 'bg-orange-50 text-orange-400'}`}
                                >
                                    {m === 'happy' ? '😊 행복' : m === 'grateful' ? '🙏 감사' : m === 'calm' ? '🧘 평온' : '🎉 신남'}
                                </button>
                            ))}
                        </div>
                        <textarea 
                            value={content} 
                            onChange={(e) => setContent(e.target.value)}
                            placeholder="오늘 당신을 웃게 만든 소소한 행복은 무엇인가요?" 
                            class="w-full p-4 border-none rounded-2xl bg-orange-50 focus:ring-2 focus:ring-orange-200 outline-none text-xl placeholder-orange-300"
                            rows="3"
                        ></textarea>
                        <div class="text-right mt-4 flex justify-between items-center">
                            <span class="text-orange-300 font-bold text-sm">작성자: {userProfile?.nickname}</span>
                            <button onClick={createPost} disabled={isPosting} class={`bg-orange-600 text-white px-8 py-3 rounded-full font-black text-xl shadow-lg transition ${isPosting ? 'opacity-50' : 'hover:bg-orange-700 active:scale-95'}`}>
                                {isPosting ? '나누는 중...' : '행복 나누기'}
                            </button>
                        </div>
                    </div>

                    <div class="space-y-12">
                        {posts.map(post => {
                            const moodColors = {
                                happy: 'border-yellow-200 bg-yellow-50/30',
                                grateful: 'border-green-200 bg-green-50/30',
                                calm: 'border-blue-200 bg-blue-50/30',
                                excited: 'border-pink-200 bg-pink-50/30'
                            };
                            return (
                                <div key={post.id} class={`p-8 rounded-[2rem] shadow-md border-2 hover:border-orange-400 transition-all cursor-pointer group ${moodColors[post.mood] || 'bg-white border-orange-100'}`} onClick={() => matchChat(post.id)}>
                                    <div class="flex justify-between items-start mb-4">
                                        <div class="flex flex-col">
                                            <div class="flex items-center space-x-2">
                                                <span class="text-orange-400 font-bold text-sm bg-white/80 px-3 py-1 rounded-full w-fit">
                                                    {getTimeRemaining(post.createdAt)}
                                                </span>
                                                {post.isWaiting && (
                                                    <span class="flex items-center space-x-1 bg-red-50 text-red-500 px-3 py-1 rounded-full text-xs font-black animate-pulse">
                                                        <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                                                        <span>대화 대기 중!</span>
                                                    </span>
                                                )}
                                            </div>
                                            <span class="text-gray-400 text-sm mt-2 font-bold">{post.nickname} 님의 행복</span>
                                        </div>
                                        <button onClick={(e) => reportPost(e, post.id)} class="text-lg hover:scale-125 transition">🚫</button>
                                    </div>
                                    <p class="text-2xl text-gray-800 leading-snug font-medium mb-6">{post.content}</p>
                                    <div class="flex items-center space-x-4 mb-6">
                                        <button 
                                            onClick={(e) => likePost(e, post.id)} 
                                            class="flex items-center space-x-1 bg-orange-50 text-orange-600 px-4 py-2 rounded-full hover:bg-orange-100 transition active:scale-90"
                                        >
                                            <span class="text-xl">👏</span>
                                            <span class="font-bold">{post.likes || 0}</span>
                                        </button>
                                    </div>
                                    <div class="flex justify-center">
                                        <span class={`w-full text-center py-4 rounded-2xl font-black text-lg transition ${post.isWaiting ? 'bg-red-500 text-white shadow-lg shadow-red-100 ring-4 ring-red-50 animate-bounce' : 'bg-orange-600 text-white group-hover:bg-orange-700'}`}>
                                            {post.isWaiting ? '즉시 대화 참여하기!' : '함께 기뻐하기 & 대화'}
                                        </span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
