<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소소행 (Soso-Haeng)</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-orange-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [posts, setPosts] = useState([]);
            const [content, setContent] = useState('');
            const [chatSession, setChatSession] = useState(null);
            const [messages, setMessages] = useState([]);
            const [msgInput, setMsgInput] = useState('');
            const [userId] = useState('user-' + Math.random().toString(36).substr(2, 9));
            const [socket, setSocket] = useState(null);
            const [now, setNow] = useState(Date.now());

            useEffect(() => {
                fetchPosts();
                const newSocket = io('http://localhost:4000');
                setSocket(newSocket);
                
                newSocket.on('receive_message', (data) => {
                    setMessages(prev => [...prev, data]);
                });

                const timer = setInterval(() => setNow(Date.now()), 1000);

                return () => {
                    newSocket.close();
                    clearInterval(timer);
                };
            }, []);

            const fetchPosts = async () => {
                try {
                    const res = await fetch('http://localhost:4000/api/posts');
                    const data = await res.json();
                    setPosts(data);
                } catch (err) {
                    console.error(err);
                }
            };

            const getTimeRemaining = (createdAt) => {
                const created = new Date(createdAt).getTime();
                const expiry = created + (24 * 60 * 60 * 1000);
                const remaining = expiry - now;
                if (remaining <= 0) return '만료됨';
                
                const hours = Math.floor(remaining / (1000 * 60 * 60));
                const mins = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((remaining % (1000 * 60)) / 1000);
                return `${hours}시간 ${mins}분 ${secs}초 남음`;
            };

            const createPost = async () => {
                if (!content) return;
                await fetch('http://localhost:4000/api/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, authorId: userId })
                });
                setContent('');
                fetchPosts();
            };

            const likePost = async (e, postId) => {
                e.stopPropagation();
                await fetch(`http://localhost:4000/api/posts/${postId}/like`, { method: 'POST' });
                fetchPosts();
            };

            const reportPost = async (e, postId) => {
                e.stopPropagation();
                if (confirm('이 글을 신고하시겠습니까? 5회 이상 신고된 글은 자동으로 삭제됩니다.')) {
                    await fetch(`http://localhost:4000/api/posts/${postId}/report`, { method: 'POST' });
                    fetchPosts();
                }
            };

            const matchChat = async (postId) => {
                const res = await fetch('http://localhost:4000/api/chat/match', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ postId, userId })
                });
                const data = await res.json();
                if (data.matched) {
                    setChatSession(data.sessionId);
                    socket.emit('join_chat', data.sessionId);
                    alert('매칭 성공! 따뜻한 대화를 시작하세요.');
                } else {
                    alert('대기 중입니다... 누군가 당신의 글을 클릭하면 대화가 시작됩니다.');
                }
            };

            const sendMessage = () => {
                if (!msgInput || !chatSession) return;
                socket.emit('send_message', { 
                    sessionId: chatSession, 
                    message: msgInput, 
                    senderId: userId 
                });
                setMsgInput('');
            };

            if (chatSession) {
                return (
                    <div class="max-w-md mx-auto p-4 flex flex-col h-screen bg-white">
                        <header class="flex justify-between items-center py-4 border-b">
                            <h1 class="text-2xl font-bold text-orange-600">소소한 대화</h1>
                            <button onClick={() => setChatSession(null)} class="text-gray-500 font-bold p-2 border rounded">대화 종료</button>
                        </header>
                        <div class="flex-grow overflow-y-auto py-4 space-y-4">
                            {messages.map((m, i) => (
                                <div key={i} class={`flex ${m.senderId === userId ? 'justify-end' : 'justify-start'}`}>
                                    <div class={`p-3 rounded-2xl max-w-[80%] text-lg ${m.senderId === userId ? 'bg-orange-500 text-white' : 'bg-gray-100 text-black'}`}>
                                        {m.message}
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div class="p-4 border-t flex space-x-2">
                            <input 
                                value={msgInput} 
                                onChange={(e) => setMsgInput(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                                placeholder="따뜻한 한마디를 건네보세요..." 
                                class="flex-grow p-3 border rounded-xl text-lg focus:outline-orange-300"
                            />
                            <button onClick={sendMessage} class="bg-orange-600 text-white px-6 py-2 rounded-xl font-bold text-lg">전송</button>
                        </div>
                    </div>
                );
            }

            return (
                <div class="max-w-md mx-auto p-4">
                    <header class="py-8 text-center">
                        <h1 class="text-4xl font-black text-orange-600 tracking-tight">소소행</h1>
                        <p class="text-orange-400 mt-2 font-medium">따뜻한 행복이 24시간 동안 머무는 곳</p>
                    </header>

                    <div class="bg-white p-6 rounded-3xl shadow-xl shadow-orange-100 mb-10 border border-orange-50">
                        <textarea 
                            value={content} 
                            onChange={(e) => setContent(e.target.value)}
                            placeholder="오늘 당신을 웃게 만든 소소한 행복은 무엇인가요?" 
                            class="w-full p-4 border-none rounded-2xl bg-orange-50 focus:ring-2 focus:ring-orange-200 outline-none text-xl placeholder-orange-300"
                            rows="3"
                        ></textarea>
                        <div class="text-right mt-4">
                            <button onClick={createPost} class="bg-orange-600 text-white px-8 py-3 rounded-full font-black text-xl shadow-lg hover:bg-orange-700 active:scale-95 transition">행복 나누기</button>
                        </div>
                    </div>

                    <div class="space-y-8">
                        {posts.map(post => (
                            <div key={post.id} class="bg-white p-8 rounded-[2rem] shadow-md border border-orange-100 hover:border-orange-400 transition-all cursor-pointer group" onClick={() => matchChat(post.id)}>
                                <div class="flex justify-between items-start mb-4">
                                    <span class="text-orange-400 font-bold text-sm bg-orange-50 px-3 py-1 rounded-full">
                                        {getTimeRemaining(post.createdAt)}
                                    </span>
                                    <button onClick={(e) => reportPost(e, post.id)} class="text-xs text-gray-300 hover:text-red-400 transition">신고</button>
                                </div>
                                <p class="text-2xl text-gray-800 leading-snug font-medium mb-6">{post.content}</p>
                                <div class="flex items-center space-x-4 mb-6">
                                    <button 
                                        onClick={(e) => likePost(e, post.id)} 
                                        class="flex items-center space-x-1 bg-orange-50 text-orange-600 px-4 py-2 rounded-full hover:bg-orange-100 transition active:scale-90"
                                    >
                                        <span class="text-xl">👏</span>
                                        <span class="font-bold">{post.likes || 0}</span>
                                    </button>
                                </div>
                                <div class="flex justify-center">
                                    <span class="w-full text-center bg-orange-600 text-white py-4 rounded-2xl font-black text-lg group-hover:bg-orange-700 transition">
                                        함께 기뻐하기 & 대화
                                    </span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
