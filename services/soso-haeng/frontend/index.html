<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소소행 (Soso-Haeng)</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-blue-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [posts, setPosts] = useState([]);
            const [content, setContent] = useState('');
            const [chatSession, setChatSession] = useState(null);
            const [messages, setMessages] = useState([]);
            const [msgInput, setMsgInput] = useState('');
            const [userId] = useState('user-' + Math.random().toString(36).substr(2, 9));
            const [socket, setSocket] = useState(null);

            useEffect(() => {
                fetchPosts();
                const newSocket = io('http://localhost:4000');
                setSocket(newSocket);
                
                newSocket.on('receive_message', (data) => {
                    setMessages(prev => [...prev, data]);
                });

                return () => newSocket.close();
            }, []);

            const fetchPosts = async () => {
                try {
                    const res = await fetch('http://localhost:4000/api/posts');
                    const data = await res.json();
                    setPosts(data);
                } catch (err) {
                    console.error(err);
                }
            };

            const createPost = async () => {
                if (!content) return;
                await fetch('http://localhost:4000/api/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, authorId: userId })
                });
                setContent('');
                fetchPosts();
            };

            const matchChat = async (postId) => {
                const res = await fetch('http://localhost:4000/api/chat/match', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ postId, userId })
                });
                const data = await res.json();
                if (data.matched) {
                    setChatSession(data.sessionId);
                    socket.emit('join_chat', data.sessionId);
                    alert('매칭 성공! 대화를 시작하세요.');
                } else {
                    alert('대기 중입니다...');
                }
            };

            const sendMessage = () => {
                if (!msgInput || !chatSession) return;
                socket.emit('send_message', { 
                    sessionId: chatSession, 
                    message: msgInput, 
                    senderId: userId 
                });
                setMsgInput('');
            };

            if (chatSession) {
                return (
                    <div class="max-w-md mx-auto p-4 flex flex-col h-screen">
                        <header class="flex justify-between items-center py-4 border-b">
                            <h1 class="text-xl font-bold">소소한 대화</h1>
                            <button onClick={() => setChatSession(null)} class="text-gray-500">나가기</button>
                        </header>
                        <div class="flex-grow overflow-y-auto py-4 space-y-2">
                            {messages.map((m, i) => (
                                <div key={i} class={`flex ${m.senderId === userId ? 'justify-end' : 'justify-start'}`}>
                                    <div class={`p-2 rounded-lg max-w-xs ${m.senderId === userId ? 'bg-blue-500 text-white' : 'bg-gray-200 text-black'}`}>
                                        {m.message}
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div class="p-4 border-t flex space-x-2">
                            <input 
                                value={msgInput} 
                                onChange={(e) => setMsgInput(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                                placeholder="메시지 입력..." 
                                class="flex-grow p-2 border rounded"
                            />
                            <button onClick={sendMessage} class="bg-blue-500 text-white px-4 py-2 rounded">전송</button>
                        </div>
                    </div>
                );
            }

            return (
                <div class="max-w-md mx-auto p-4">
                    <header class="py-6 text-center">
                        <h1 class="text-3xl font-extrabold text-blue-600">소소행</h1>
                        <p class="text-gray-500 mt-2">24시간 후 사라지는 따뜻한 순간들</p>
                    </header>

                    <div class="bg-white p-4 rounded-xl shadow-md mb-8">
                        <textarea 
                            value={content} 
                            onChange={(e) => setContent(e.target.value)}
                            placeholder="지금 어떤 행복을 느끼고 있나요?" 
                            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-300 outline-none"
                            rows="3"
                        ></textarea>
                        <div class="text-right mt-2">
                            <button onClick={createPost} class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 transition">공유하기</button>
                        </div>
                    </div>

                    <div class="space-y-6">
                        {posts.map(post => (
                            <div key={post.id} class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100 hover:border-blue-300 transition cursor-pointer" onClick={() => matchChat(post.id)}>
                                <p class="text-lg text-gray-800 leading-relaxed mb-4">{post.content}</p>
                                <div class="flex justify-between items-center text-sm text-gray-400">
                                    <span>{new Date(post.createdAt).toLocaleTimeString()}</span>
                                    <span class="bg-blue-50 text-blue-500 px-3 py-1 rounded-full">공감하고 대화하기</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
