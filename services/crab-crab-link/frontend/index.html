<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꽃게링크 - 1인 가구의 현명한 동네 생활</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
    <header role="banner">
        <div class="container">
            <div class="logo" aria-label="꽃게링크 로고">🦀 꽃게링크</div>
            <nav role="navigation" aria-label="메인 메뉴">
                <ul>
                    <li><a href="#" class="active" aria-current="page" data-i18n="home">홈</a></li>
                    <li><a href="#" data-i18n="split">꽃게 스플릿</a></li>
                    <li><a href="#" data-i18n="library">꽃게 라이브러리</a></li>
                    <li><a href="#" data-i18n="tips">꽃게 꿀팁</a></li>
                </ul>
            </nav>
            <div class="user-menu">
                <select id="lang-select" class="lang-selector" aria-label="언어 선택">
                    <option value="ko">KO</option>
                    <option value="en">EN</option>
                    <option value="ja">JA</option>
                </select>
                <button id="login-btn" class="btn-secondary" data-i18n="login">로그인</button>
            </div>
        </div>
    </header>

    <main role="main">
        <section class="hero" aria-labelledby="hero-title">
            <div class="container">
                <div class="hero-content">
                    <div class="hero-text">
                        <h1 id="hero-title" data-i18n="heroTitle">나누면 커지는 이득,<br>꽃게링크로 연결하세요.</h1>
                        <p data-i18n="heroSub">동네 이웃과 함께 사고, 빌리고, 정보를 나눠보세요.</p>
                        <button class="btn-primary" aria-label="꽃게링크 서비스 시작하기" data-i18n="startBtn">시작하기</button>
                    </div>
                    <div class="hero-character" aria-hidden="true">
                        <div class="crab-char-large">🦀</div>
                        <div class="speech-bubble" data-i18n="crabTip">"오늘도 우리 동네 소식을 확인해 보세요!"</div>
                    </div>
                </div>
            </div>
        </section>

        <div class="location-banner" role="status" aria-live="polite">
            <div class="container">
                <span id="current-location" data-i18n="verifyBanner">📍 내 동네를 인증해주세요.</span>
                <button id="verify-location-btn" class="btn-verify-small" data-i18n="verifyBtn">인증하기</button>
            </div>
        </div>

        <section class="feed" aria-labelledby="feed-title">
            <div class="container">
                <div class="section-header">
                    <h2 id="feed-title" data-i18n="recentPosts">최근 게시글</h2>
                    <button class="btn-secondary" id="create-post-btn" aria-label="새 글 작성하기" data-i18n="writeBtn">글쓰기</button>
                </div>
                
                <div class="feed-controls">
                    <div class="search-box">
                        <input type="text" id="search-input" data-i18n="searchPlaceholder" placeholder="필요한 물건이나 정보를 검색해보세요">
                        <button id="search-btn" aria-label="Search">🔍</button>
                    </div>
                    <div class="sort-box">
                        <label for="sort-select" data-i18n="sortBy">정렬 기준</label>
                        <select id="sort-select">
                            <option value="latest" data-i18n="sortLatest">최신순</option>
                            <option value="temperature" data-i18n="sortTemp">온도순</option>
                        </select>
                    </div>
                </div>
                
                <nav class="filter-tabs" aria-label="카테고리 필터">
                    <button class="filter-btn active" data-category="ALL" aria-pressed="true" data-i18n="categoryAll">전체</button>
                    <button class="filter-btn" data-category="식재료" aria-pressed="false" data-i18n="categoryFood">식재료</button>
                    <button class="filter-btn" data-category="생필품" aria-pressed="false" data-i18n="categoryGood">생필품</button>
                    <button class="filter-btn" data-category="도구/공유" aria-pressed="false" data-i18n="categoryTool">도구/공유</button>
                </nav>

                <div id="post-list" class="post-grid" role="list">
                    <!-- 게시글이 여기에 동적으로 추가됩니다 -->
                </div>
            </div>
        </section>
    </main>

    <footer role="contentinfo">
        <div class="container">
            <p data-i18n="footer">&copy; 2026 CrabTeam. All rights reserved.</p>
        </div>
    </footer>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav" aria-label="모바일 하단 메뉴">
        <a href="#" class="active" data-i18n="home">홈</a>
        <a href="#" data-i18n="split">스플릿</a>
        <a href="#" data-i18n="library">라이브러리</a>
        <a href="#" data-i18n="tips">꿀팁</a>
    </nav>

    <!-- Verification Modal -->
    <div id="verify-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-content">
            <span class="close-btn" aria-label="닫기">&times;</span>
            <h2 id="modal-title" data-i18n="verifyModalTitle">동네 인증하기 🏠</h2>
            <p data-i18n="verifyModalBody">꽃게링크는 신뢰할 수 있는 이웃 간의 거래를 위해 동네 인증이 필요합니다.</p>
            <div class="map-preview">
                <div id="mock-map" aria-hidden="true">📍</div>
                <p id="location-text" data-i18n="locationLoading">현재 위치를 가져오는 중...</p>
            </div>
            <button id="confirm-verify-btn" class="btn-primary" style="width: 100%;" data-i18n="confirmVerify">이 동네로 인증 완료</button>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
