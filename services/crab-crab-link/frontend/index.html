<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꽃게링크 (crab-crab-link) - 1인 가구의 현명한 동네 생활</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">🦀 꽃게링크</div>
            <nav>
                <ul>
                    <li><a href="#" class="active">홈</a></li>
                    <li><a href="#">꽃게 스플릿</a></li>
                    <li><a href="#">꽃게 라이브러리</a></li>
                    <li><a href="#">꽃게 꿀팁</a></li>
                </ul>
            </nav>
            <div class="user-menu">
                <button id="login-btn">로그인</button>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>나누면 커지는 이득,<br>꽃게링크로 연결하세요.</h1>
                <p>동네 이웃과 함께 사고, 빌리고, 정보를 나눠보세요.</p>
                <button class="btn-primary">시작하기</button>
            </div>
        </section>

        <section class="feed">
            <div class="container">
                <div class="section-header">
                    <h2>최근 게시글</h2>
                    <button class="btn-secondary" id="create-post-btn">글쓰기</button>
                </div>
                <div id="post-list" class="post-grid">
                    <!-- 게시글이 여기에 동적으로 추가됩니다 -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 CrabTeam. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
