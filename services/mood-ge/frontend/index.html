<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood-Ge (무드게)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>무드게 (Mood-Ge)</h1>
            <p>오늘의 번아웃 회복 수치: <span id="recovery-score">0</span>%</p>
        </header>

        <section class="mood-crab-section">
            <div id="mood-crab" class="crab neutral animated">
                <div class="crab-body">
                    <div class="eyes">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                </div>
                <div class="claw left"></div>
                <div class="claw right"></div>
            </div>
            <p id="crab-message">"반가워요! 오늘은 어떤 기분인가요?"</p>
            <button class="share-btn" onclick="shareProgress()">결과 공유하기 📤</button>
        </section>

        <section class="weekly-report">
            <h2>주간 번아웃 리포트</h2>
            <div class="chart-container">
                <div class="bar" style="height: 40%">월</div>
                <div class="bar" style="height: 60%">화</div>
                <div class="bar" style="height: 80%">수</div>
                <div class="bar active" style="height: 20%">목</div>
                <div class="bar" style="height: 50%">금</div>
            </div>
        </section>

        <section class="community">
            <h2>익명 꽃게 응원단 🦀</h2>
            <div class="cheer-box">
                <p>지금까지 <span id="cheer-total">0</span>번의 응원이 오갔어요!</p>
                <button onclick="sendCheer()">나도 응원 보내기 ❤️</button>
            </div>
        </section>

        <section class="mood-picker">
            <button onclick="logMood('happy', 100)">😊</button>
            <button onclick="logMood('neutral', 50)">😐</button>
            <button onclick="logMood('tired', 20)">😫</button>
            <button onclick="logMood('sad', 10)">😢</button>
        </section>

        <section class="mood-note">
            <textarea id="mood-memo" placeholder="무슨 일이 있었나요? (선택 사항)"></textarea>
        </section>

        <section class="challenges">
            <h2>오늘의 꽃게 퀘스트</h2>
            <ul id="challenge-list">
                <!-- Challenges will be loaded here -->
            </ul>
        </section>

        <section class="history">
            <h2>최근 꽃게 기록</h2>
            <ul id="history-list">
                <!-- Logs will be loaded here -->
            </ul>
        </section>

        <section class="stats">
            <div class="streak-badge">3일 연속 달성 중! 🔥</div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
