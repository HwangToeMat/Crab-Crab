<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood-Ge v2.0 'Infinite' - 번아웃 회복 AI 파트너</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #7F00FF; /* Electric Purple */
            --secondary: #0000FF; /* Deep Blue */
            --bg: #0b0b1a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 20px;
        }
        #app {
            max-width: 500px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .token-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .evolution-card {
            background: var(--card-bg);
            border: 1px solid rgba(127, 0, 255, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .burnout-meter {
            height: 10px;
            background: #222;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }
        #burnout-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #928dab);
            width: 45%;
            transition: width 1s ease;
        }
        textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 10px;
            box-sizing: border-box;
            resize: none;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.02); }
        .challenge-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        .ambassador-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .ambassador-card {
            background: rgba(0,0,255,0.1);
            padding: 10px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        .ai-result {
            display: none;
            background: rgba(127,0,255,0.2);
            padding: 15px;
            border-radius: 15px;
            border-left: 4px solid var(--primary);
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>Mood-Ge <span style="font-size:0.8rem; color:var(--primary);">v2.0 ∞</span></h1>
            <div class="token-badge">💎 <span id="token-count">1000</span> CT</div>
        </header>

        <section class="evolution-card">
            <h3>진화 상태: 번아웃 회복 중 🦀</h3>
            <div class="burnout-meter"><div id="burnout-fill"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:#999;">
                <span>STREAK 🔥 <span id="streak-count">5</span></span>
                <span>CHEERS 👏 <span id="cheer-count">120</span></span>
            </div>
        </section>

        <section class="evolution-card">
            <h3>오늘의 마음 기록 (AI 분석)</h3>
            <p style="font-size:0.8rem; color:#aaa;">오늘 당신의 감정은 어떤가요? 무드게 AI가 분석해드립니다.</p>
            <textarea id="mood-note" rows="3" placeholder="예: 오늘은 조금 지치고 번아웃이 온 것 같아..."></textarea>
            <button id="analyze-btn">AI 감정 분석 시작</button>
            <div id="ai-result" class="ai-result">
                <strong style="color:var(--primary);">🤖 무드게 AI 코치:</strong>
                <p id="ai-advice" style="margin:5px 0; line-height:1.4;"></p>
            </div>
        </section>

        <section class="evolution-card">
            <h3>지능형 퀘스트 (Reward Inside)</h3>
            <div id="challenge-list"></div>
        </section>

        <section class="evolution-card">
            <h3>힐링 앰배서더 트랙</h3>
            <div id="ambassador-grid" class="ambassador-grid"></div>
        </section>

        <button id="cheer-btn" style="background: var(--secondary); margin-top: 20px;">무한한 응원 보내기 👏</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
